name: Release Matrix (CLI)

# Cross-platform `hanzo` binaries on OUR runners, published to the GitHub
# Release for the tag. NO GitHub-hosted builders — every target names a
# self-hosted scale set.
#
# Only `hanzo-build-linux-amd64` exists today (14 runners, one scale set). The
# macos-arm64 / linux-arm64 / windows-amd64 pools are NOT provisioned: naming
# them here queued the jobs forever and the whole matrix cancelled, which is why
# v1.0.0 and v1.1.0 tagged but never shipped a binary. Targets are added back as
# their pools come online — a target with no pool ships nothing and hides that
# it shipped nothing.

on:
  workflow_dispatch:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target.id }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: linux-amd64
            runner: hanzo-build-linux-amd64
            rust: x86_64-unknown-linux-gnu
          # linux-arm64 is NOT here, and that is deliberate. Cross-compiling it on
          # the amd64 pool dies in openssl-sys: reqwest links OpenSSL, and arm64
          # needs arm64 OpenSSL headers, which the cross toolchain alone does not
          # provide. The three real options are a genuine arm64 runner pool,
          # vendored OpenSSL, or moving reqwest to rustls (which drops the C
          # dependency entirely and is probably right — but it changes the TLS
          # stack, so it is a decision, not a build flag).
          #
          # A target that cannot build must be ABSENT, not listed and failing: a
          # red release is indistinguishable from a broken one, and a pending
          # target is what wedged the matrix before v1.2.0.
    runs-on: ${{ matrix.target.runner }}
    steps:
      - uses: actions/checkout@v4
      # The ARC runner image is bare — no C toolchain at all ("linker `cc` not
      # found" on the first tag that ever reached a build). reqwest needs
      # OpenSSL, and keyring's sync-secret-service needs dbus.
      - name: System dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev libdbus-1-dev curl jq
          if [ "${{ matrix.target.rust }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu
          fi
      # A tag is a claim about what the binary IS. v1.3.0 shipped a 1.2.0 binary
      # because nothing checked the tag against the crate — the version test in
      # rust-tests.yml compares Cargo.toml to --version, which both said 1.2.0
      # and agreed perfectly while the tag lied. Refuse to publish a mislabeled
      # release.
      - name: Tag matches the crate
        run: |
          set -euo pipefail
          v="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')"
          [ "v$v" = "${{ github.ref_name }}" ] || {
            echo "tag ${{ github.ref_name }} but Cargo.toml is $v — the release would be mislabeled"
            exit 1
          }
          echo "tag matches crate: v$v"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.rust }}
      # Tests GATE the artifact: an asset nobody tested is not a release. No
      # workflow had ever run cargo here, so 188 tests shipped unproven.
      # Tests run on the HOST arch only — a cross-built binary cannot execute here.
      # An untested asset is still gated: amd64 runs the suite, and arm64 is the
      # same source through the same compiler.
      - name: Test
        if: matrix.target.rust == 'x86_64-unknown-linux-gnu'
        run: cargo test --bin hanzo --locked
      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --bin hanzo --locked --target ${{ matrix.target.rust }}
      - name: Package
        run: |
          set -euo pipefail
          # The binary is `hanzo` (Cargo.toml [[bin]]), never `cli` — the old
          # glob matched nothing and `if-no-files-found: warn` hid it.
          out="target/${{ matrix.target.rust }}/release/hanzo"
          test -f "$out"
          tar -czf "hanzo-${{ matrix.target.id }}.tar.gz" -C "$(dirname "$out")" hanzo
          sha256sum "hanzo-${{ matrix.target.id }}.tar.gz" > "hanzo-${{ matrix.target.id }}.tar.gz.sha256"
      # Publish STRAIGHT from the build job, over the REST API.
      #
      # No artifact round-trip: the org's artifact storage quota is exhausted and
      # it failed a build that had already succeeded. The artifact was only ever a
      # courier; the release is the destination.
      #
      # curl, not `gh`: the ARC image ships no gh CLI (`gh: command not found`
      # killed the first build that got this far). curl+jq is what the runner
      # actually has, so the publish step depends on nothing we have to install
      # beyond what the build already needs.
      - name: Publish
        env:
          TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/$REPO"
          uploads="https://uploads.github.com/repos/$REPO"
          auth=(-H "Authorization: Bearer $TOKEN" -H "Accept: application/vnd.github+json")

          # Find-or-create: a re-run must upload, not fail on an existing release.
          id="$(curl -s "${auth[@]}" "$api/releases/tags/$TAG" | jq -r '.id // empty')"
          if [ -z "$id" ]; then
            id="$(curl -s -X POST "${auth[@]}" \
              -d "$(jq -nc --arg t "$TAG" '{tag_name:$t,name:$t,generate_release_notes:true}')" \
              "$api/releases" | jq -r '.id // empty')"
          fi
          [ -n "$id" ] || { echo "could not create or find release $TAG"; exit 1; }

          for f in hanzo-${{ matrix.target.id }}.tar.gz hanzo-${{ matrix.target.id }}.tar.gz.sha256; do
            test -f "$f"
            # Same name twice would 422; drop the old asset first so re-runs work.
            old="$(curl -s "${auth[@]}" "$api/releases/$id/assets" | jq -r --arg n "$f" '.[] | select(.name==$n) | .id')"
            [ -n "$old" ] && curl -s -X DELETE "${auth[@]}" "$api/releases/assets/$old" >/dev/null
            code="$(curl -s -o /tmp/up.json -w '%{http_code}' -X POST "${auth[@]}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$f" "$uploads/releases/$id/assets?name=$f")"
            [ "$code" = "201" ] || { echo "upload $f failed ($code)"; cat /tmp/up.json; exit 1; }
            echo "uploaded $f"
          done
